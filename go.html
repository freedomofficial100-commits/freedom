<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: linear-gradient(135deg, #1a0a00 0%, #3D1F0D 50%, #6B3A20 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: #fff8f0;
    border-radius: 24px;
    padding: 48px 36px;
    text-align: center;
    max-width: 380px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .logo { font-size: 48px; margin-bottom: 12px; }
  h1 { font-size: 22px; color: #3D1F0D; font-weight: 700; margin-bottom: 8px; }
  p { font-size: 15px; color: #6B3A20; margin-bottom: 32px; line-height: 1.6; }
  .wa-btn {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    background: #25D366;
    color: #fff;
    text-decoration: none;
    padding: 18px 36px;
    border-radius: 50px;
    font-size: 18px;
    font-weight: 700;
    box-shadow: 0 8px 24px rgba(37,211,102,0.4);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .wa-btn:hover { transform: scale(1.04); box-shadow: 0 12px 32px rgba(37,211,102,0.5); }
  .wa-btn svg { flex-shrink: 0; }
  .note { font-size: 12px; color: #aaa; margin-top: 20px; }
  .spinner {
    display: none;
    width: 40px; height: 40px;
    border: 4px solid #e0d5c8;
    border-top-color: #25D366;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 20px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .auto-msg { display: none; font-size: 14px; color: #25D366; font-weight: 600; margin-bottom: 16px; }
</style>
</head>

<script>
  // Auto-redirect after short delay (helps bypass TikTok browser restrictions)
  var phone = '966564919342';
  var waUrl = 'https://wa.me/' + phone;

  // Try to open immediately on load
  window.addEventListener('DOMContentLoaded', function() {
